version: 2
jobs:
  build:
    docker:
      - image: martinthomson/i-d-template:latest
    resource_class: small
    working_directory: ~/draft

    steps:
      - run:
          name: "Print Configuration"
          command: |
            xml2rfc --version
            gem list -q kramdown-rfc
            echo -n 'mmark '; mmark --version

      - restore_cache:
          name: "Restoring cache - Git"
          keys:
            - v3-cache-git-{{ .Branch }}-{{ .Revision }}
            - v3-cache-git-{{ .Branch }}
            - v3-cache-git-

      - restore_cache:
          name: "Restoring cache - References"
          keys:
            - v1-cache-references-{{ epoch }}
            - v1-cache-references-

      # Workaround for https://discuss.circleci.com/t/22437
      - run:
          name: Tag Checkout
          command: |
            if [ -n "$CIRCLE_TAG" ] && [ -d .git ]; then
              remote=$(echo "$CIRCLE_REPOSITORY_URL" | \
                       sed -e 's,/^git.github.com:,https://github.com/,')
              git fetch -f "$remote" "refs/tags/$CIRCLE_TAG:refs/tags/$CIRCLE_TAG" || \
                (echo 'Removing .git cache for tag build'; rm -rf .git)
            fi

      - checkout

      # Build txt and html versions of drafts
      - run:
          name: "Build Drafts"
          command: make

      # === FIX: Bypassing the fragile makefile clone loop ===
      - run:
          name: "Update GitHub Pages"
          command: |
            if [ "${CIRCLE_TAG#draft-}" == "$CIRCLE_TAG" ]; then
              echo "Manually updating gh-pages branch..."
              
              # 1. Establish the clean staging directory
              TARGET_DIR="/tmp/ghpages"
              rm -rf "$TARGET_DIR"
              
              # 2. Grab the clean target tracking branch via default checkout credentials
              git clone -b gh-pages "$CIRCLE_REPOSITORY_URL" "$TARGET_DIR"
              
              # 3. Manually copy the compiled text and html draft files into the root
              cp *.html *.txt "$TARGET_DIR/" 2>/dev/null || true
              
              # 4. If your repo uses subdirectories (like main/ or l7lb/), copy those over too
              if [ -d main ]; then cp -r main/* "$TARGET_DIR/main/" 2>/dev/null || cp -r main "$TARGET_DIR/"; fi
              if [ -d l7lb ]; then cp -r l7lb/* "$TARGET_DIR/l7lb/" 2>/dev/null || cp -r l7lb "$TARGET_DIR/"; fi
              
              # 5. Go into the clean directory, commit, and push out
              cd "$TARGET_DIR"
              git config user.name "CircleCI"
              git config user.email "circleci@dontlink.me"
              git add -A
              
              if ! git diff-index --quiet HEAD; then
                git commit -m "Update GitHub Pages (Build $CIRCLE_BUILD_NUM)"
                git push origin gh-pages
              else
                echo "No changes detected. Skipping commit."
              fi
            fi

      # For tagged builds, upload to the datatracker.
      - run:
          name: "Upload to Datatracker"
          command: |
            if [ "${CIRCLE_TAG#draft-}" != "$CIRCLE_TAG" ]; then
              make upload
            fi

      # Archive GitHub Issues
      - run:
          name: "Archive GitHub Issues"
          command: "make archive || make archive DISABLE_ARCHIVE_FETCH=true && make gh-archive"

      # Create and store artifacts
      - run:
          name: "Create Artifacts"
          command: "make artifacts CI_ARTIFACTS=/tmp/artifacts"

      - store_artifacts:
          path: /tmp/artifacts

      - run:
          name: "Prepare for Caching"
          command: "git reflog expire --expire=now --all && git gc --prune=now"

      - save_cache:
          name: "Saving Cache - Git"
          key: v3-cache-git-{{ .Branch }}-{{ .Revision }}
          paths:
            - ~/draft/.git

      - save_cache:
          name: "Saving Cache - Drafts"
          key: v1-cache-references-{{ epoch }}
          paths:
            - ~/.cache/xml2rfc

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            tags:
              only: /.*?/
