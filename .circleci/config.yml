version: 2
jobs:
  build:
    docker:
      - image: martinthomson/i-d-template:latest
    resource_class: small
    working_directory: ~/draft

    steps:
      - run:
          name: "Print Configuration"
          command: |
            xml2rfc --version
            gem list -q kramdown-rfc
            echo -n 'mmark '; mmark --version

      - restore_cache:
          name: "Restoring cache - Git"
          keys:
            - v3-cache-git-{{ .Branch }}-{{ .Revision }}
            - v3-cache-git-{{ .Branch }}
            - v3-cache-git-

      - restore_cache:
          name: "Restoring cache - References"
          keys:
            - v1-cache-references-{{ epoch }}
            - v1-cache-references-

      # Workaround for https://discuss.circleci.com/t/22437
      - run:
          name: Tag Checkout
          command: |
            if [ -n "$CIRCLE_TAG" ] && [ -d .git ]; then
              remote=$(echo "$CIRCLE_REPOSITORY_URL" | \
                       sed -e 's,/^git.github.com:,https://github.com/,')
              git fetch -f "$remote" "refs/tags/$CIRCLE_TAG:refs/tags/$CIRCLE_TAG" || \
                (echo 'Removing .git cache for tag build'; rm -rf .git)
            fi

      - checkout

      # Build txt and html versions of drafts
      - run:
          name: "Build Drafts"
          command: make

      # Update editor's copy on gh-pages
      - run:
          name: "Update GitHub Pages"
          command: |
            if [ "${CIRCLE_TAG#draft-}" == "$CIRCLE_TAG" ]; then
              # 1. Build the drafts locally so we have the fresh outputs ready
              make
              
              # 2. Clone the real gh-pages branch cleanly from GitHub into a fresh separate directory
              git clone --depth 1 -b gh-pages https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git /tmp/ghpages-clean
              
              # 3. Copy our freshly compiled artifacts into that clean directory
              # (Adjust these filenames if your built drafts have different names/extensions)
              cp *.html *.txt /tmp/ghpages-clean/ 2>/dev/null || true
              if [ -d l7lb ]; then cp -r l7lb /tmp/ghpages-clean/; fi
              if [ -d main ]; then cp -r main /tmp/ghpages-clean/; fi
              
              # 4. Move into the clean directory, commit, and push back to GitHub
              cd /tmp/ghpages-clean
              git config user.name "CircleCI Job"
              git config user.email "circleci@dontlink.me"
              git add .
              
              # Only commit and push if something actually changed
              if ! git diff-index --quiet HEAD; then
                git commit -m "Update GitHub Pages from CircleCI build $CIRCLE_BUILD_NUM [skip ci]"
                git push origin gh-pages
              else
                echo "No changes to deploy to GitHub Pages."
              fi
            fi

      # For tagged builds, upload to the datatracker.
      - deploy:
          name: "Upload to Datatracker"
          command: |
            if [ "${CIRCLE_TAG#draft-}" != "$CIRCLE_TAG" ]; then
              make upload
            fi

      # Archive GitHub Issues
      - run:
          name: "Archive GitHub Issues"
          command: "make archive || make archive DISABLE_ARCHIVE_FETCH=true && make gh-archive"

      # Create and store artifacts
      - run:
          name: "Create Artifacts"
          command: "make artifacts CI_ARTIFACTS=/tmp/artifacts"

      - store_artifacts:
          path: /tmp/artifacts

      - run:
          name: "Prepare for Caching"
          command: "git reflog expire --expire=now --all && git gc --prune=now"

      - save_cache:
          name: "Saving Cache - Git"
          key: v3-cache-git-{{ .Branch }}-{{ .Revision }}
          paths:
            - ~/draft/.git

      - save_cache:
          name: "Saving Cache - Drafts"
          key: v1-cache-references-{{ epoch }}
          paths:
            - ~/.cache/xml2rfc


workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            tags:
              only: /.*?/
